name: sonatek-steel-website

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sonatek_mongo
    restart: unless-stopped
    ports:
      - '27013:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sonatek-steels

  # ── Express API ───────────────────────────────────────────────────────────────
  server:
    image: ghcr.io/m-afnan2018/sonatek-steels-website-server:${TAG:-latest}
    pull_policy: always
    container_name: sonatek_server
    restart: unless-stopped
    ports:
      - '5013:5000'
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
    environment:
      NODE_ENV:       production
      PORT:           5000
      MONGODB_URI:    mongodb://mongo:27017/sonatek-steels
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL:     ${CLIENT_URL:-http://localhost:3013}
      SMTP_HOST:      ${SMTP_HOST:-}
      SMTP_PORT:      ${SMTP_PORT:-587}
      SMTP_USER:      ${SMTP_USER:-}
      SMTP_PASS:      ${SMTP_PASS:-}
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-}

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  client:
    image: ghcr.io/m-afnan2018/sonatek-steels-website-client:${TAG:-latest}
    pull_policy: always
    container_name: sonatek_client
    restart: unless-stopped
    ports:
      - '3013:3000'
    depends_on:
      - server
    environment:
      NODE_ENV: production

volumes:
  mongo_data:
  uploads_data:
